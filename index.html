<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tool Buff View & Tim TikTok Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080f1a;
            --bg-card: #0d1929;
            --bg-panel: #0a1520;
            --teal: #00e5c3;
            --teal-dim: #00b89c;
            --teal-glow: rgba(0,229,195,0.15);
            --teal-border: rgba(0,229,195,0.25);
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
            --sky: #7dd3fc;
            --text-primary: #e2f0f7;
            --text-muted: #6b8fa8;
            --text-dim: #3d5a6e;
            --border: rgba(255,255,255,0.07);
            --radius-lg: 20px;
            --radius-pill: 999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; min-width: 0; }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            font-family: 'Sora', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 16px 40px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,195,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,195,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,229,195,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            max-width: 560px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--teal-border);
            box-shadow:
                0 0 0 1px rgba(0,229,195,0.05),
                0 30px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.06);
            overflow: hidden;
            position: relative;
            z-index: 1;
            margin-top: 20px;
            min-width: 0;
        }

        .header {
            padding: 28px 24px 22px;
            text-align: center;
            background: linear-gradient(160deg, #0a2230 0%, #061520 100%);
            border-bottom: 1px solid var(--teal-border);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -40px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 100px;
            background: radial-gradient(ellipse, rgba(0,229,195,0.2) 0%, transparent 70%);
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,229,195,0.1);
            border: 1px solid var(--teal-border);
            border-radius: var(--radius-pill);
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--teal);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            line-height: 1.2;
            position: relative;
        }

        .header h1 span {
            color: var(--teal);
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-top: 6px;
            font-weight: 500;
        }

        .author-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 5px 14px;
            font-size: 0.72rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .content {
            padding: 22px 20px 24px;
            overflow: hidden;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .menu-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 12px 8px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-muted);
            font-family: 'Sora', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .menu-btn .icon {
            font-size: 1.3rem;
        }

        .menu-btn:hover, .menu-btn.active {
            background: var(--teal-glow);
            border-color: var(--teal-border);
            color: var(--teal);
            transform: translateY(-2px);
        }

        .menu-btn:active {
            transform: scale(0.97);
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            animation: fadeIn 0.2s ease;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: 'JetBrains Mono', monospace;
        }

        .panel-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--teal-border);
        }

        .form-group {
            margin-bottom: 14px;
            width: 100%;
            overflow: hidden;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            min-width: 0;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Sora', sans-serif;
            outline: none;
            transition: all 0.2s;
            display: block;
        }

        input:focus, select:focus {
            border-color: var(--teal-border);
            box-shadow: 0 0 0 3px var(--teal-glow);
            background: rgba(0,0,0,0.6);
        }

        input::placeholder { color: var(--text-dim); }

        select option { background: #0d1929; }

        .btn {
            width: 100%;
            padding: 13px 16px;
            border: none;
            border-radius: 12px;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .btn + .btn { margin-top: 8px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--teal-dim), #007a68);
            color: white;
            box-shadow: 0 4px 15px rgba(0,185,156,0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--teal), var(--teal-dim));
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,229,195,0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(248,113,113,0.1);
            color: var(--red);
            border: 1px solid rgba(248,113,113,0.2);
        }

        .btn-danger:hover { background: rgba(248,113,113,0.2); }

        .btn-warning {
            background: rgba(245,158,11,0.1);
            color: var(--yellow);
            border: 1px solid rgba(245,158,11,0.2);
        }

        .btn-warning:hover { background: rgba(245,158,11,0.2); }

        .btn:active { transform: scale(0.98) !important; }

        .service-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .service-tab {
            padding: 12px;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .service-tab .tab-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .service-tab .tab-price { font-size: 0.68rem; color: var(--text-dim); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

        .service-tab.active {
            background: var(--teal-glow);
            border-color: var(--teal);
            color: var(--teal);
        }

        .service-tab.active .tab-price { color: var(--teal-dim); }

        .price-estimate {
            background: rgba(0,229,195,0.06);
            border: 1px solid var(--teal-border);
            border-radius: 10px;
            padding: 10px 14px;
            text-align: center;
            font-size: 0.82rem;
            color: var(--sky);
            margin: 12px 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .balance-display {
            text-align: center;
            padding: 24px 16px;
        }

        .balance-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 8px;
        }

        .balance-value {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
            text-shadow: 0 0 30px rgba(74,222,128,0.3);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            font-size: 0.7rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .status-pending { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }
        .status-inprogress { background: rgba(125,211,252,0.12); color: var(--sky); border: 1px solid rgba(125,211,252,0.25); }
        .status-completed { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.25); }

        .history-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .history-item:hover { border-color: var(--teal-border); }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .history-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--teal);
        }

        .history-date {
            font-size: 0.68rem;
            color: var(--text-dim);
        }

        .status-result-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--teal-border);
            border-radius: 14px;
            padding: 16px;
            margin-top: 14px;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .status-row:last-child { border-bottom: none; padding-bottom: 0; }

        .status-key {
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
        }

        .status-val {
            color: var(--text-primary);
            font-weight: 600;
            text-align: right;
        }

        .info-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .info-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .info-card .ic-icon { font-size: 1.4rem; margin-bottom: 5px; }
        .info-card .ic-title { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; }
        .info-card .ic-price { font-size: 0.78rem; color: var(--teal); font-family: 'JetBrains Mono', monospace; font-weight: 700; margin-top: 2px; }

        .contact-bar {
            text-align: center;
            padding: 10px;
            font-size: 0.72rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            margin-top: 10px;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(0,229,195,0.15);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-msg {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(13,25,41,0.95);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 1100;
            border: 1px solid var(--teal-border);
            pointer-events: none;
            white-space: nowrap;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
        }

        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 20px;
            min-height: 260px;
        }

        .btn-start {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            padding: 16px 44px;
            border-radius: var(--radius-pill);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(245,158,11,0.35);
            transition: all 0.25s;
            letter-spacing: 1.5px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Sora', sans-serif;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 14px 40px rgba(245,158,11,0.5);
        }

        .key-box {
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
        }

        .error-shake { animation: shake 0.3s ease-in-out; border-color: var(--red) !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .success-card {
            text-align: center;
            padding: 20px 10px;
        }

        .key-limit-item {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .key-limit-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--teal);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="glass-card" id="appContainer">
    <div class="header">
        <div class="header-badge">⚡ v2.0 PRO</div>
        <h1>BUFF TIKTOK <span>PRO</span></h1>
        <p>Tăng View & Tim nhanh chóng · Uy tín số 1</p>
        <div class="author-tag">🌐 By Duy Hoang · ZL: 0385933633</div>
    </div>
    <div class="content" id="mainContent"></div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Đang xử lý...</div>
</div>

<script>
    const API_URL = "https://subtuongtac.com/api/v2";
    const API_KEY = "32aa6bcd06e04d69df997fc2dbf8d8f1";
    const TELE_TOKEN = "8749280669:AAFXp_SD6N0AZsygP85Id1iexwADSKwlp6E";
    const TELE_CHAT_ID = "6286372153";
    const ADMIN_KEY = "DuyHoangViewTT";
    const HISTORY_KEY = "tiktok_orders_v2";
    const USED_KEYS_KEY = "used_keys_v2";

    const SERVICES = {
        view: { id: 5274, name: "TikTok View", icon: "👀", price_per_1000: 500, min: 1000, unit: "view", price_desc: "500đ / 1k view" },
        like: { id: 355, name: "TikTok Tim", icon: "❤️", price_per_package: 600, package_size: 50, min: 50, unit: "tim", price_desc: "600đ / 50 tim" }
    };

    let ordersHistory = {};
    let usedKeys = {}; // Lưu key đã dùng và giới hạn của nó
    let currentUserKey = null; // Key đang được sử dụng
    let currentKeyLimits = null; // Giới hạn của key hiện tại

    function loadHistory() {
        try { ordersHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}'); }
        catch(e) { ordersHistory = {}; }
        try { usedKeys = JSON.parse(localStorage.getItem(USED_KEYS_KEY) || '{}'); }
        catch(e) { usedKeys = {}; }
    }

    function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(ordersHistory));
        localStorage.setItem(USED_KEYS_KEY, JSON.stringify(usedKeys));
    }

    function showToast(msg, isError = false) {
        let t = document.querySelector('.toast-msg');
        if (!t) { t = document.createElement('div'); t.className = 'toast-msg'; document.body.appendChild(t); }
        t.style.borderColor = isError ? 'rgba(248,113,113,0.4)' : 'rgba(0,229,195,0.25)';
        t.innerHTML = msg;
        t.style.visibility = 'visible';
        t.style.opacity = '1';
        t.style.transform = 'translateX(-50%) translateY(0)';
        setTimeout(() => {
            t.style.opacity = '0';
            t.style.transform = 'translateX(-50%) translateY(10px)';
            setTimeout(() => t.style.visibility = 'hidden', 300);
        }, 2800);
    }

    function showLoading(show, text = "Đang xử lý...") {
        const ol = document.getElementById('loadingOverlay');
        const tl = document.getElementById('loadingText');
        if (tl) tl.textContent = text;
        ol.style.visibility = show ? 'visible' : 'hidden';
        ol.style.opacity = show ? '1' : '0';
    }

    function sendTelegramNotification(text) {
        if (!TELE_TOKEN || !TELE_CHAT_ID) return;
        fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TELE_CHAT_ID, text, parse_mode: "HTML" })
        }).catch(() => {});
    }

    async function apiRequest(payload) {
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
                body: new URLSearchParams(payload).toString()
            });
            return await res.json();
        } catch(e) { return { error: e.message || "Lỗi kết nối" }; }
    }

    function isValidTikTokUrl(url) {
        return [
            /^https?:\/\/(?:www\.)?tiktok\.com\/@[^\/]+\/video\/\d+/,
            /^https?:\/\/(?:vm|vt)\.tiktok\.com\/\w+\/?$/,
            /^https?:\/\/(?:www\.)?tiktok\.com\/t\/\w+\/?$/
        ].some(p => p.test(url.trim()));
    }

    function calcPrice(type, qty) {
        if (type === 'view') return (qty / 1000) * SERVICES.view.price_per_1000;
        return Math.ceil(qty / SERVICES.like.package_size) * SERVICES.like.price_per_package;
    }

    function getStatusBadge(status) {
        const s = (status || '').toLowerCase();
        if (s === 'completed') return `<span class="status-badge status-completed">✓ Hoàn thành</span>`;
        if (s === 'in progress' || s === 'inprogress' || s === 'processing') return `<span class="status-badge status-inprogress">⟳ Đang chạy</span>`;
        return `<span class="status-badge status-pending">⏳ Chờ xử lý</span>`;
    }

    // Kiểm tra key có hợp lệ và còn giới hạn không
    function validateKeyLimits(key, serviceType, quantity) {
        if (key === ADMIN_KEY) return { valid: true, message: "" };
        
        const keyData = usedKeys[key];
        if (!keyData || keyData.used) {
            return { valid: false, message: "❌ Key không tồn tại hoặc đã được sử dụng!" };
        }
        
        const limits = keyData.limits;
        if (!limits) return { valid: false, message: "❌ Key không có giới hạn hợp lệ!" };
        
        if (serviceType === 'view') {
            if (limits.view_limit === null) return { valid: true, message: "" };
            if (quantity > limits.view_limit) {
                return { valid: false, message: `❌ Key chỉ còn ${limits.view_limit.toLocaleString()} view, bạn đang yêu cầu ${quantity.toLocaleString()} view!` };
            }
        } else if (serviceType === 'like') {
            if (limits.like_limit === null) return { valid: true, message: "" };
            if (quantity > limits.like_limit) {
                return { valid: false, message: `❌ Key chỉ còn ${limits.like_limit.toLocaleString()} tim, bạn đang yêu cầu ${quantity.toLocaleString()} tim!` };
            }
        }
        
        return { valid: true, message: "" };
    }

    // Cập nhật giới hạn key sau khi sử dụng
    function updateKeyLimits(key, serviceType, quantity) {
        if (key === ADMIN_KEY) return;
        
        const keyData = usedKeys[key];
        if (!keyData) return;
        
        if (serviceType === 'view' && keyData.limits.view_limit !== null) {
            keyData.limits.view_limit -= quantity;
            if (keyData.limits.view_limit < 0) keyData.limits.view_limit = 0;
        } else if (serviceType === 'like' && keyData.limits.like_limit !== null) {
            keyData.limits.like_limit -= quantity;
            if (keyData.limits.like_limit < 0) keyData.limits.like_limit = 0;
        }
        
        // Kiểm tra nếu cả hai đều hết thì đánh dấu đã dùng
        const viewLeft = keyData.limits.view_limit;
        const likeLeft = keyData.limits.like_limit;
        if ((viewLeft === 0 || viewLeft === null) && (likeLeft === 0 || likeLeft === null)) {
            keyData.used = true;
        }
        
        saveHistory();
    }

    // Tạo key mới (chỉ admin)
    function createNewKey(keyName, viewLimit, likeLimit) {
        if (usedKeys[keyName]) {
            return { success: false, message: "Key đã tồn tại!" };
        }
        
        usedKeys[keyName] = {
            used: false,
            limits: {
                view_limit: viewLimit === '' ? null : parseInt(viewLimit),
                like_limit: likeLimit === '' ? null : parseInt(likeLimit)
            },
            created_at: new Date().toLocaleString('vi-VN')
        };
        saveHistory();
        return { success: true, message: `✅ Tạo key thành công: ${keyName}` };
    }

            setTimeout(() => {
                showLoading(false);
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('keySection').style.display = 'flex';
                document.getElementById('secretKey').focus();
                showToast("🔐 Nhập mã kích hoạt để tiếp tục");
            }, 1200);
        };

        const verify = () => {
            const key = document.getElementById('secretKey').value.trim();
            if (!key) {
                showToast("Vui lòng nhập key!", true);
                return;
            }
            
            const result = handleKeyLogin(key);
            if (result.success) {
                showLoading(true, "Xác thực thành công...");
                setTimeout(() => {
                    showLoading(false);
                    renderMainMenu();
                    showToast(result.message);
                }, 700);
            } else {
                const inp = document.getElementById('secretKey');
                inp.classList.add('error-shake');
                showToast(result.message, true);
                setTimeout(() => inp.classList.remove('error-shake'), 400);
                inp.value = '';
                inp.focus();
            }
        };

        document.getElementById('submitKeyBtn').onclick = verify;
        document.getElementById('secretKey').onkeypress = e => { if (e.key === 'Enter') verify(); };
    }

    loadHistory();
    showStartScreen();
</script>
</body>
</html>
